function roundToStore(name,rawAmount,rawUnit){
const lk=name.toLowerCase();
let pkg=PKG[name];
if(!pkg){for(const[k,v]of Object.entries(PKG)){if(lk.includes(k.toLowerCase())){pkg=v;break}}}
if(!pkg)return{displayAmt:Math.ceil(rawAmount),displayUnit:rawUnit,price:0};
// Find smallest package size that fits, or multiple packages
let needed=rawAmount;
const sz=pkg.sizes;
// For multi-size items (like turkey 1lb/2.5lb), find best combo
if(sz.length>1){
let bestCost=Infinity,bestQty='',bestPrice=0;
// Try each single size
for(let i=0;i<sz.length;i++){
const count=Math.ceil(needed/sz[i]);
const cost=count*pkg.prices[i];
const label=count>1?count+'x '+sz[i]+' '+pkg.unit:sz[i]+' '+pkg.unit;
if(cost<bestCost){bestCost=cost;bestQty=label;bestPrice=cost}}
// Try combining sizes (largest first)
for(let i=sz.length-1;i>=0;i--){
const big=Math.floor(needed/sz[i]);
const rem=needed-big*sz[i];
if(big>0&&rem>0){
for(let j=0;j<sz.length;j++){
const small=Math.ceil(rem/sz[j]);
const cost=big*pkg.prices[i]+small*pkg.prices[j];
const label=(big>1?big+'x ':'')+sz[i]+' '+pkg.unit+' + '+(small>1?small+'x ':'')+sz[j]+' '+pkg.unit;
if(cost<bestCost){bestCost=cost;bestQty=label;bestPrice=cost}}}}
return{displayAmt:bestQty,displayUnit:'',price:bestPrice}}
else{
const count=Math.ceil(needed/sz[0]);
const cost=count*pkg.prices[0];
const containers=['bottle','jar','bag','can','canister','packet','box','tub','head','bunch','pint','piece'];
const pl={'bunch':'bunches','piece':'pieces','pint':'pints'};
let amt;
if(containers.includes(pkg.unit)){const plural=pl[pkg.unit]||(pkg.unit+'s');amt=(count===1?'1 '+pkg.unit:count+' '+plural);}
else{amt=(count>1?count+' \xd7 ':'')+sz[0]+' '+pkg.unit;}
return{displayAmt:amt,displayUnit:'',price:cost}}}

function gT(r,sv,up){let c=0,p=0,cb=0,f=0;for(const i of r.ingredients){if(i[0]==='PASTA'){const pa=up?r.pp:r.rp;if(pa){c+=pa[3];p+=pa[4];cb+=pa[5];f+=pa[6]}continue}c+=i[3];p+=i[4];cb+=i[5];f+=i[6]}return{c,p,cb,f}}

function oR(id){const r=R.find(x=>x.id===id);if(!r)return;cv='detail';document.getElementById('listView').classList.add('hidden');document.getElementById('shopView').style.display='none';document.getElementById('detailView').style.display='block';document.getElementById('backBtn').style.display='block';document.getElementById('shopBtn').style.display='none';window.scrollTo(0,0);rD(r,r.sv,r.dp||false)}
function rD(r,sv,up){const d=document.getElementById('detailView'),sc=sv/r.sv,em=EMOJI[r.id]||'🍽️',cost=getRecipeCost(r),sCost=(cost*(sv/r.sv)).toFixed(2),tt=r.pt+r.ct;
const badges=r.cats.map(c=>`<span class="badge ${CB[c]||'b-nomeat'}">${c}</span>`).join('');
let rows='',tc=0,tp=0,tcb=0,tf=0;
for(const i of r.ingredients){let nm,am,un,cl,pr,cb,ft;if(i[0]==='PASTA'){const pa=up?r.pp:r.rp;if(!pa)continue;[nm,am,un,cl,pr,cb,ft]=[pa[0],pa[1],pa[2],pa[3],pa[4],pa[5],pa[6]]}else{[nm,am,un,cl,pr,cb,ft]=i}
const sC=Math.round(cl*sc),sP=Math.round(pr*sc*10)/10,sCb=Math.round(cb*sc*10)/10,sF=Math.round(ft*sc*10)/10,sA=Math.round(am*sc*100)/100;tc+=sC;tp+=sP;tcb+=sCb;tf+=sF;
rows+=`<tr><td class="in">${nm}</td><td class="am">${fA(sA)} ${un}</td><td class="cal">${sC}</td><td class="pro">${Math.round(sP)}g</td><td class="carb">${Math.round(sCb)}g</td><td class="fat">${Math.round(sF)}g</td></tr>`}
const ps={c:Math.round(tc/sv),p:Math.round(tp/sv),cb:Math.round(tcb/sv),f:Math.round(tf/sv)};
let pt='';if(r.hp)pt=`<div class="ptog"><label>Pasta Type</label><label class="tsw"><input type="checkbox" id="pt" ${up?'checked':''} onchange="oPT(${r.id},${sv})"><span class="tsl"></span></label><span class="ptl">${up?'Protein':'Regular'}</span></div>`;
const qb=[2,4,8];
d.innerHTML=`<div class="card-badges">${badges}</div><div class="detail-icon">${em}</div><h1 class="dt">${r.name}</h1><p class="dd">${r.desc}</p>
<div class="detail-meta"><span class="dm-item">⏱ <strong>${fmtTime(r.pt)}</strong> prep</span><span class="dm-item">🔥 <strong>${fmtTime(r.ct)}</strong> cook</span><span class="dm-item">⏰ <strong>${fmtTime(tt)}</strong> total</span><span class="dm-cost">~$${sCost} est.</span></div>
<div class="srv"><div class="srv-top"><span>Servings</span><span class="srv-ct" id="svC">${sv}</span></div><div class="srv-btns">${qb.map(q=>`<button class="srv-qb ${sv===q?'act':''}" onclick="oSV(${r.id},${q})">${q}</button>`).join('')}</div><input type="range" min="1" max="12" value="${sv}" id="svS" oninput="oSV(${r.id},+this.value)"></div>${pt}
<div class="macbox"><div><div class="mv" style="color:var(--m-cal)">${ps.c}</div><div class="ml">cal/srv</div></div><div><div class="mv" style="color:var(--m-pro)">${ps.p}g</div><div class="ml">protein</div></div><div><div class="mv" style="color:var(--m-carb)">${ps.cb}g</div><div class="ml">carbs</div></div><div><div class="mv" style="color:var(--m-fat)">${ps.f}g</div><div class="ml">fat</div></div></div>
<h2 class="stit">Ingredients & Macros</h2><div class="mtw"><table class="mt"><thead><tr><th>Ingredient</th><th>Amount</th><th>Cal</th><th>Pro</th><th>Carb</th><th>Fat</th></tr></thead><tbody>${rows}<tr class="trow"><td>Total</td><td></td><td class="cal">${Math.round(tc)}</td><td class="pro">${Math.round(tp)}g</td><td class="carb">${Math.round(tcb)}g</td><td class="fat">${Math.round(tf)}g</td></tr></tbody></table></div>
<h2 class="stit">Instructions</h2><ol class="steps">${r.steps.map(s=>`<li><span class="stt">${s[0]}</span>${s[1]}</li>`).join('')}</ol>
${r.notes?`<h2 class="stit">Notes & Tips</h2><div class="notes"><p>${r.notes}</p></div>`:''}`}
function oSV(id,v){const r=R.find(x=>x.id===id);rD(r,v,document.getElementById('pt')?.checked||false)}
function oPT(id,sv){const r=R.find(x=>x.id===id);rD(r,sv,document.getElementById('pt').checked)}
function fA(n){if(n===0)return'';if(n>=1&&n%1===0)return''+n;if(n>=1)return n.toFixed(1).replace(/\.0$/,'');const f=[[.25,'¼'],[.33,'⅓'],[.5,'½'],[.67,'⅔'],[.75,'¾']];for(const[v,s]of f)if(Math.abs(n-v)<.06)return s;return n.toFixed(1)}

function randomRecipe(){const r=R[Math.floor(Math.random()*R.length)];const em=EMOJI[r.id]||'🍽️',tt=r.pt+r.ct,cost=getRecipeCost(r);
document.getElementById('randomCard').innerHTML=`<div style="font-size:3rem;margin-bottom:8px">${em}</div><h2 style="font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:6px">${r.name}</h2><p style="color:var(--text-sec);font-size:.85rem;margin-bottom:4px">${r.desc}</p><p style="font-size:.8rem;color:var(--text-muted);margin-bottom:16px">⏱ ${fmtTime(tt)} · ~$${cost.toFixed(2)}</p><div class="random-btns"><button class="rb-again" onclick="randomRecipe()">🎲 Again</button><button class="rb-go" onclick="closeRandom();oR(${r.id})">Let's Cook!</button></div>`;
document.getElementById('randomOverlay').classList.add('show')}
function closeRandom(){document.getElementById('randomOverlay').classList.remove('show')}

// === SHOPPING LIST ===
function toggleShop(){if(cv==='shopping'){goBack();return}cv='shopping';document.getElementById('listView').classList.add('hidden');document.getElementById('detailView').style.display='none';document.getElementById('shopView').style.display='block';document.getElementById('backBtn').style.display='block';document.getElementById('shopBtn').classList.add('active');ss.clear();customItems=[];haveItems=new Set();rSL();document.getElementById('shRes').style.display='none';window.scrollTo(0,0)}
function rSL(){const c=document.getElementById('shopSelect');let h='',lc='';const co=['Breakfast','Chicken','Turkey','Steak','Crock Pot','Pasta','No Meat','Desserts'];const shown=new Set();
for(const cat of co){let has=false;for(const r of R){if(r.cats[0]===cat&&!shown.has(r.id)){if(!has){h+=`<div class="shop-cat-hdr">${cat}</div>`;has=true}shown.add(r.id);const s=ss.has(r.id);h+=`<div class="sri ${s?'sel':''}" onclick="tS(${r.id})"><div class="sch">${s?'✓':''}</div><span class="srn">${r.name}</span></div>`}}}
c.innerHTML=h;const b=document.getElementById('genBtn');const tc=Array.from(ss).reduce((s,id)=>{const r=R.find(x=>x.id===id);return s+getRecipeCost(r)},0);
b.textContent=ss.size>0?`Generate List (${ss.size} recipes · ~$${tc.toFixed(2)})`:'Generate Shopping List (0 selected)';b.disabled=ss.size===0}
function tS(id){if(ss.has(id))ss.delete(id);else ss.add(id);rSL()}

function genList(){
const m={};
for(const id of ss){const r=R.find(x=>x.id===id);for(const i of r.ingredients){
if(i[0]==='PASTA'){const p=r.rp;if(p){const k=p[0].toLowerCase();if(!m[k])m[k]={name:p[0],amount:0,unit:p[2]};m[k].amount+=p[1]}continue}
if(['salt & pepper','cooking spray','salt','black pepper'].includes(i[0]))continue;
const k=i[0].toLowerCase().replace(/,.*$/,'').trim();if(!m[k])m[k]={name:i[0],amount:0,unit:i[2]};m[k].amount+=i[1]}}
// Apply store rounding and pricing
window._shopData=Object.values(m).map(item=>{
const rounded=roundToStore(item.name,item.amount,item.unit);
return{...item,displayAmt:rounded.displayAmt,displayUnit:rounded.displayUnit,price:rounded.price}}).sort((a,b)=>a.name.localeCompare(b.name));
haveItems=new Set();
document.getElementById('shRes').style.display='block';
rSC();
document.getElementById('shRes').scrollIntoView({behavior:'smooth'});
}

function toggleHave(key){if(haveItems.has(key))haveItems.delete(key);else haveItems.add(key);rSC()}

function addCustomItem(){const input=document.getElementById('addItemInput');const v=input.value.trim();if(!v)return;customItems.push(v);input.value='';rSC()}

function getShopTotal(){
if(!window._shopData)return 0;
let total=0;
for(const item of window._shopData){if(!haveItems.has(item.name))total+=item.price}
return total;
}

function renderItem(item){
const have=haveItems.has(item.name);
const priceStr=item.price>0?'$'+item.price.toFixed(2):'';
let amtStr;
if(typeof item.displayAmt==='string'){amtStr=item.displayAmt}
else{amtStr=fA(item.displayAmt)+(item.displayUnit?' '+item.displayUnit:'')}
return`<div class="shi"><div class="shi-check ${have?'have':''}" onclick="toggleHave('${item.name.replace(/'/g,"\\'")}')">${have?'✓':''}</div><span class="shi-text ${have?'have-text':''}">${amtStr} ${item.name}</span><span class="shi-price ${have?'have-price':''}">${priceStr}</span></div>`}

function rSC(){
const c=document.getElementById('shContent'),items=window._shopData||[];
const customHtml=customItems.length?`<div class="shsec"><h3>🛒 Other Items</h3>${customItems.map((ci,i)=>{const have=haveItems.has('custom_'+i);return`<div class="shi"><div class="shi-check ${have?'have':''}" onclick="toggleHave('custom_${i}')">${have?'✓':''}</div><span class="shi-text ${have?'have-text':''}">${ci}</span><span class="shi-price"></span></div>`}).join('')}</div>`:'';

if(slv==='alpha'){c.innerHTML=items.map(i=>renderItem(i)).join('')+customHtml}
else{const s={};for(const i of items){const sec=gS(i.name);if(!s[sec])s[sec]=[];s[sec].push(i)}
const o=['Produce','Meat & Poultry','Dairy & Eggs','Bread & Bakery','Pasta & Grains','Canned & Jarred','Pantry & Spices','Frozen','Other'];
c.innerHTML=o.filter(x=>s[x]).map(x=>`<div class="shsec"><h3>${x}</h3>${s[x].map(i=>renderItem(i)).join('')}</div>`).join('')+customHtml}

const total=getShopTotal();
document.getElementById('shopTotal').innerHTML=`<div class="total-label">Estimated Total (Aldi)</div><div class="total-val">$${total.toFixed(2)}</div><div class="total-label" style="margin-top:4px;font-size:.75rem">Tap items you already have to update total</div>`;
document.getElementById('copyBtn').textContent=`📋 Copy List · $${total.toFixed(2)} est.`;
}

function setLV(v,b){slv=v;document.querySelectorAll('.ltb').forEach(x=>x.classList.remove('act'));b.classList.add('act');rSC()}

function copyList(){
const items=window._shopData||[];
let t=items.filter(i=>!haveItems.has(i.name)).map(i=>{
let a;if(typeof i.displayAmt==='string')a=i.displayAmt;else a=fA(i.displayAmt)+(i.displayUnit?' '+i.displayUnit:'');
return`${a} ${i.name}${i.price>0?' ($'+i.price.toFixed(2)+')':''}`}).join('\n');
const skipped=items.filter(i=>haveItems.has(i.name));
if(skipped.length)t+='\n\nAlready have:\n'+skipped.map(i=>i.name).join(', ');
if(customItems.length)t+='\n\nOther:\n'+customItems.join('\n');
const total=getShopTotal();
t+='\n\nEstimated Total: $'+total.toFixed(2);
navigator.clipboard.writeText('🛒 Shopping List:\n'+t).then(()=>{const b=document.getElementById('copyBtn');b.textContent='✅ Copied!';setTimeout(()=>b.textContent='📋 Copy List · $'+total.toFixed(2)+' est.',2000)})}

function goBack(){cv='list';document.getElementById('listView').classList.remove('hidden');document.getElementById('detailView').style.display='none';document.getElementById('shopView').style.display='none';document.getElementById('backBtn').style.display='none';document.getElementById('shopBtn').style.display='';document.getElementById('shopBtn').classList.remove('active');window.scrollTo(0,0)}

rT();rG();
</script>
</body>
</html>
